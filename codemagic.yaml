workflows:

  # ─────────────────────────────────────────────
  #  BUILD MACOS
  # ─────────────────────────────────────────────
  macos-release:
    name: macOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic 2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.torla.ogntiipodinsegnamento"

    scripts:
      - name: Abilita macOS in Flutter
        script: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Pod install
        script: |
          cd macos && pod install

      - name: Build macOS
        script: |
          flutter build macos --release \
            --build-name=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1) \
            --build-number=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f2)

      - name: Crea PKG per App Store
        script: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "App trovata: $APP_PATH"
          PKG_PATH="build/macos/Build/Products/Release/app.pkg"
          xcrun productbuild \
            --component "$APP_PATH" /Applications \
            "$PKG_PATH"
          echo "PKG creato: $PKG_PATH"

      - name: Pubblica su App Store Connect
        script: |
          PKG_PATH="build/macos/Build/Products/Release/app.pkg"
          xcrun altool --upload-package "$PKG_PATH" \
            --type macos \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

    artifacts:
      - build/macos/Build/Products/Release/*.pkg


  # ─────────────────────────────────────────────
  #  BUILD WINDOWS
  # ─────────────────────────────────────────────
  windows-release:
    name: Windows Release
    max_build_duration: 60
    instance_type: windows_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Windows
        script: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

    artifacts:
      - build/windows/x64/runner/Release/**


  # ─────────────────────────────────────────────
  #  BUILD ANDROID
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Android
        script: |
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab


  # ─────────────────────────────────────────────
  #  BUILD iOS
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic 2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build iOS
        script: |
          flutter pub get
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
