workflows:

  # ─────────────────────────────────────────────
  #  BUILD + UPLOAD macOS (App Store)
  # ─────────────────────────────────────────────
  macos-release:
    name: macOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic 2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.torla.ogntiipodinsegnamento"
        APP_NAME: "Ogni tipo di insegnamento Mac"

    scripts:
      - name: Enable macOS + dependencies
        script: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Pod install
        script: |
          cd macos && pod install

      - name: Archive macOS app (Xcode)
        script: |
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/macos/Runner.xcarchive \
            archive

      - name: Export PKG for App Store
        script: |
          xcodebuild -exportArchive \
            -archivePath build/macos/Runner.xcarchive \
            -exportPath build/macos/pkg \
            -exportOptionsPlist macos/ExportOptions.plist

    artifacts:
      - build/macos/pkg/*.pkg

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false


  # ─────────────────────────────────────────────
  #  BUILD WINDOWS
  # ─────────────────────────────────────────────
  windows-release:
    name: Windows Release
    max_build_duration: 60
    instance_type: windows_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Windows
        script: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

    artifacts:
      - build/windows/x64/runner/Release/**


  # ─────────────────────────────────────────────
  #  BUILD ANDROID
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Android
        script: |
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab


  # ─────────────────────────────────────────────
  #  BUILD iOS
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic 2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build iOS
        script: |
          flutter pub get
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa