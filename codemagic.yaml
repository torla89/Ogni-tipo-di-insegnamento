workflows:

  # ─────────────────────────────────────────────
  #  BUILD MACOS
  # ─────────────────────────────────────────────
  macos-release:
    name: macOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1   # Mac virtuale su Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.torla.ogntiipodinsegnamento"
        APP_NAME: "Ogni tipo di insegnamento"
      # Aggiungi queste variabili nel pannello Codemagic (Environment variables):
      #   APP_STORE_CONNECT_ISSUER_ID
      #   APP_STORE_CONNECT_KEY_IDENTIFIER
      #   APP_STORE_CONNECT_PRIVATE_KEY
      #   CERTIFICATE_PRIVATE_KEY
      app_store_connect:
        auth: integration   # usa l'integrazione App Store Connect di Codemagic

    scripts:
      - name: Abilita macOS in Flutter
        script: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Copia icona
        script: |
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.icns \
             macos/Runner/Assets.xcassets/AppIcon.appiconset/ 2>/dev/null || true

      - name: Pod install
        script: |
          cd macos && pod install

      - name: Build macOS
        script: |
          flutter build macos --release

      - name: Firma e pacchettizza (Mac App Store)
        script: |
          APP_PATH="build/macos/Build/Products/Release/$APP_NAME.app"
          xcrun altool --validate-app -f "$APP_PATH" -t macos \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.pkg
      - "*.dmg"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false   # metti true quando sei pronto al rilascio


  # ─────────────────────────────────────────────
  #  BUILD WINDOWS (già funzionante, per riferimento)
  # ─────────────────────────────────────────────
  windows-release:
    name: Windows Release
    max_build_duration: 60
    instance_type: windows_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Windows
        script: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

    artifacts:
      - build/windows/x64/runner/Release/**


  # ─────────────────────────────────────────────
  #  BUILD ANDROID
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      android_signing:
        - keystore_reference   # configura il keystore nel pannello Codemagic

    scripts:
      - name: Build Android
        script: |
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal   # oppure: alpha, beta, production


  # ─────────────────────────────────────────────
  #  BUILD iOS
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      app_store_connect:
        auth: integration

    scripts:
      - name: Build iOS
        script: |
          flutter pub get
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
