workflows:

  macos-release:
    name: macOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic 2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.torla.ogntiipodinsegnamento"
        APP_NAME: "Ogni tipo di insegnamento Mac"

    scripts:
      - name: Abilita macOS in Flutter
        script: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Pod install
        script: |
          cd macos && pod install

      - name: Build macOS
        script: |
          flutter build macos --release

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.pkg


  windows-release:
    name: Windows Release
    max_build_duration: 60
    instance_type: windows_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Windows
        script: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

    artifacts:
      - build/windows/x64/runner/Release/**


  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable

    scripts:
      - name: Build Android
        script: |
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab


  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic 2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build iOS
        script: |
          flutter pub get
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

